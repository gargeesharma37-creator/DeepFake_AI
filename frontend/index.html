<!DOCTYPE html>
<html>

<head>
    <title>DeepFake Voice Detector</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🤖 DeepFake AI Detector</h1>

    <div class="card">

        <h2>🎙 Voice Detection</h2>

        <input type="file" id="audioFile">

        <br>

        <button onclick="detectVoice()">
            Detect Voice
        </button>

        <p id="result" class="result"></p>

    </div>

    <div class="card">

        <h2>🎥 Video Detection</h2>

        <input type="file" id="videoFile">

        <br>

        <button onclick="detectVideo()">
            Detect Video
        </button>

        <p id="videoResult" class="result"></p>

    </div>

    <script src="script.js"></script>

</body>
